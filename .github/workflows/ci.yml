name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch / PR when a new commit lands.
# Saves CI minutes and surfaces the latest result faster.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.2"

jobs:
  # ── Fast checks (no browser, ~2-3 min) ────────────────────────────────
  quality:
    name: Lint · Typecheck · Test · Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Next.js production build
        run: pnpm build

      - name: Bundle budget check
        run: pnpm build:check

  # ── Slow checks (Playwright + browser, ~5-8 min) ──────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Playwright browsers across runs (~150 MB chromium).
      # Re-install only when the lockfile changes.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (for production server)
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      # Surface the HTML report and any traces when a test fails, so
      # debugging doesn't require a local re-run.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
